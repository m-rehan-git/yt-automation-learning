name: YouTube Automation Pipeline

on:
  schedule:
    # Run every day at 9:00 AM UTC (adjust as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      topic:
        description: 'Video topic (leave blank for AI research)'
        required: false
        default: ''
      upload:
        description: 'Upload to YouTube?'
        required: false
        default: 'true'

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "CHANNEL_NICHE=${{ secrets.CHANNEL_NICHE }}" >> .env
          echo "TTS_VOICE=en-US-GuyNeural" >> .env
          echo "YOUTUBE_PRIVACY_STATUS=public" >> .env
          echo "OUTPUT_DIR=output" >> .env

      - name: Restore YouTube OAuth token
        if: secrets.YOUTUBE_TOKEN_PICKLE != ''
        run: |
          mkdir -p config
          echo "${{ secrets.YOUTUBE_TOKEN_PICKLE }}" | base64 -d > config/token.pickle
          echo "${{ secrets.YOUTUBE_CLIENT_SECRETS }}" > config/client_secrets.json

      - name: Run pipeline
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          UPLOAD="${{ github.event.inputs.upload }}"
          if [ -n "$TOPIC" ]; then
            TOPIC_FLAG="--topic \"$TOPIC\""
          fi
          if [ "$UPLOAD" = "false" ]; then
            python main.py $TOPIC_FLAG --no-upload
          else
            python main.py $TOPIC_FLAG
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: |
            output/final_video.mp4
            output/thumbnail.jpg
            output/publication_package.md
            output/metadata.json
            output/script.json
          retention-days: 7
